<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOMEWORK</title>
  <link rel="stylesheet" href="/CSS/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer"
   />
</head>
<body>
  <header>
    <div class="header__logo">
      <img src="/image/logo.png" alt="header__logo">
    </div>

    <nav>
      <ul class="nav__links">
        <li>
          <a class="nav__links--link1" href="#">Home</a>
        </li>
        <li>
          <a class="nav__links--link" href="#">Destinations</a>
        </li>
        <li>
          <a class="nav__links--link" href="#">About</a>
        </li>
        <li>
          <a class="nav__links--link" href="#">Partner</a>
        </li>
      </ul>
    </nav>

    <div class="header__icons">
      <button class="header__icons--btn">Login</button>
      <button class="header__icons--btn2">Register</button>
    </div>
  </header>

  

  <section class="hero">
    <div class="hero__text">
      <h1>Explore and Travel</h1>
      <p>Holiday finder</p>
      <form class="form">
        <select class="form__title">
          <option>Location</option>
        </select>  

        <select class="form__title">
          <option>Activity</option>
        </select>  

        <select class="form__title">
          <option>Grade</option>
        </select>  

        <select class="form__title">
          <option>Date</option>
        </select>  

         <div>
          <button class="form__title--btn" type="submit">Explore</button>
         </div>
      </form>
    </div>

    <div class="form__img">
      <img width="400" src="/image/thousand-01 1.png" alt="">
    </div>
  </section>
</body>
</html>
